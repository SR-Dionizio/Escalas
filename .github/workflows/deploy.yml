name: Deploy to EC2 via SSM

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  INSTANCE_ID: i-0e52ba2984a45dc96

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

            - name: Deploy application
              id: deploy
              run: |
                COMMAND_ID=$(aws ssm send-command \
                  --instance-ids "${{ env.INSTANCE_ID }}" \
                  --document-name "AWS-RunShellScript" \
                  --comment "Deploy Escalas" \
                  --parameters '{
                    "commands":[
                      "sudo mkdir -p /opt/escalas",
                      "if [ ! -d /opt/escalas/.git ]; then sudo git clone https://github.com/SR-Dionizio/Escalas.git /opt/escalas; fi",
                      "cd /opt/escalas",
                      "sudo git fetch origin",
                      "sudo git reset --hard origin/main",
                      "sudo docker stop escalas || true",
                      "sudo docker rm escalas || true",
                      "sudo docker build -t escalas:latest .",
                      "sudo mkdir -p /opt/escalas/data",
                      "sudo docker run -d --restart unless-stopped --name escalas -p 8000:8000 -v /opt/escalas/data:/app-data escalas:latest"
                    ]
                  }' \
                  --query "Command.CommandId" \
                  --output text)

                echo "Command ID: $COMMAND_ID"
                echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

            - name: Wait for completion
              run: sleep 20

            - name: Show execution result
              run: |
                aws ssm get-command-invocation \
                  --command-id $COMMAND_ID \
                  --instance-id "${{ env.INSTANCE_ID }}" \
                  --region "${{ env.AWS_REGION }}"

            - name: Validate deployment
              run: |
                STATUS=$(aws ssm get-command-invocation \
                  --command-id $COMMAND_ID \
                  --instance-id "${{ env.INSTANCE_ID }}" \
                  --query "Status" \
                  --output text \
                  --region "${{ env.AWS_REGION }}")

                echo "Deployment status: $STATUS"

                if [ "$STATUS" != "Success" ]; then
                  exit 1
                fi