name: Deploy to EC2 via SSM

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  INSTANCE_ID: i-0e52ba2984a45dc96

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy application
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Escalas" \
            --parameters '{
              "commands":[
                "set -e",
                "echo \"[1/8] Stopping existing container...\"",
                "sudo docker stop escalas || true",
                "sudo docker rm escalas || true",
                "echo \"[2/8] Cleaning old files...\"",
                "sudo rm -rf /opt/escalas",
                "echo \"[3/8] Cloning repository...\"",
                "sudo git clone https://github.com/SR-Dionizio/Escalas.git /opt/escalas",
                "cd /opt/escalas",
                "echo \"[4/8] Building Docker image...\"",
                "sudo docker build -t escalas:latest . || { echo \"Docker build failed!\"; exit 1; }",
                "echo \"[5/8] Creating data directory...\"",
                "sudo mkdir -p /opt/escalas-data",
                "echo \"[6/8] Starting container...\"",
                "sudo docker run -d --restart unless-stopped --name escalas -p 8000:8000 -e DATABASE_PATH=/app-data/escalas.db -v /opt/escalas-data:/app-data escalas:latest || { echo \"Container start failed!\"; exit 1; }",
                "echo \"[7/8] Waiting for container to be healthy...\"",
                "sleep 5",
                "echo \"[8/8] Checking container status...\"",
                "sudo docker ps | grep escalas || { echo \"Container not running!\"; exit 1; }",
                "echo \"✅ Deployment completed successfully!\""
              ]
            }' \
            --query "Command.CommandId" \
            --output text \
            --region "${{ env.AWS_REGION }}")

          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV
          echo "Command ID: $COMMAND_ID"

      - name: Wait for completion
        run: |
          echo "Waiting for deployment to complete..."
          sleep 40

      - name: Get execution result
        id: get_result
        run: |
          RESULT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.INSTANCE_ID }}" \
            --region "${{ env.AWS_REGION }}")
          
          echo "$RESULT" | jq '.'
          
          STATUS=$(echo "$RESULT" | jq -r '.Status')
          STDOUT=$(echo "$RESULT" | jq -r '.StandardOutputContent')
          STDERR=$(echo "$RESULT" | jq -r '.StandardErrorContent')
          
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "stdout<<EOF" >> $GITHUB_OUTPUT
          echo "$STDOUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "stderr<<EOF" >> $GITHUB_OUTPUT
          echo "$STDERR" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Display deployment logs
        run: |
          echo "=== DEPLOYMENT STATUS ==="
          echo "${{ steps.get_result.outputs.status }}"
          echo ""
          echo "=== STANDARD OUTPUT ==="
          echo "${{ steps.get_result.outputs.stdout }}"
          echo ""
          echo "=== STANDARD ERROR ==="
          echo "${{ steps.get_result.outputs.stderr }}"

      - name: Validate deployment
        run: |
          STATUS="${{ steps.get_result.outputs.status }}"
          
          echo "Final deployment status: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            echo "❌ Deployment FAILED!"
            echo "Check the logs above for details."
            exit 1
          fi

          echo "✅ Deployment completed successfully!"